<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" style="background: rgba(255,255,255,0.02); border-radius: 12px;">
  <!-- Title -->
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#e6e6e6">
    DLI-CVD Deposition Process
  </text>

  <!-- Precursor Container -->
  <rect x="50" y="80" width="120" height="100" fill="rgba(135, 206, 235, 0.2)" stroke="#87ceeb" stroke-width="2" rx="8"/>
  <text x="110" y="110" font-size="13" font-weight="bold" text-anchor="middle" fill="#87ceeb">Precursor</text>
  <text x="110" y="130" font-size="11" text-anchor="middle" fill="#e6e6e6">Solution</text>
  <text x="110" y="150" font-size="10" text-anchor="middle" fill="#b0b0b0">(LiNbO₃)</text>

  <!-- Arrow 1 -->
  <path d="M 170 130 L 220 130" stroke="#87ceeb" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="195" y="125" font-size="11" text-anchor="middle" fill="#b0b0b0">Injection</text>

  <!-- Vaporization Chamber -->
  <rect x="220" y="80" width="120" height="100" fill="rgba(191, 230, 255, 0.15)" stroke="#bfe6ff" stroke-width="2" rx="8"/>
  <text x="280" y="110" font-size="13" font-weight="bold" text-anchor="middle" fill="#bfe6ff">Vaporization</text>
  <text x="280" y="135" font-size="10" text-anchor="middle" fill="#b0b0b0">Heated Zone</text>
  <text x="280" y="155" font-size="10" text-anchor="middle" fill="#b0b0b0">~250-300°C</text>

  <!-- Arrow 2 -->
  <path d="M 340 130 L 390 130" stroke="#87ceeb" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="365" y="125" font-size="11" text-anchor="middle" fill="#b0b0b0">Vapor</text>

  <!-- CVD Reactor -->
  <circle cx="470" cy="130" r="70" fill="rgba(30, 30, 50, 0.4)" stroke="#87ceeb" stroke-width="2"/>
  <text x="470" y="115" font-size="13" font-weight="bold" text-anchor="middle" fill="#87ceeb">CVD</text>
  <text x="470" y="135" font-size="13" font-weight="bold" text-anchor="middle" fill="#87ceeb">Reactor</text>
  <text x="470" y="155" font-size="10" text-anchor="middle" fill="#b0b0b0">~700-800°C</text>

  <!-- Arrow 3 -->
  <path d="M 540 130 L 590 130" stroke="#87ceeb" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="565" y="125" font-size="11" text-anchor="middle" fill="#b0b0b0">Deposition</text>

  <!-- Substrate with Film -->
  <rect x="590" y="95" width="140" height="70" fill="rgba(50, 50, 80, 0.4)" stroke="#87ceeb" stroke-width="2" rx="6"/>
  <text x="660" y="120" font-size="12" font-weight="bold" text-anchor="middle" fill="#87ceeb">Substrate</text>
  <rect x="600" y="125" width="120" height="8" fill="#ffd700" opacity="0.8" rx="2"/>
  <text x="660" y="145" font-size="10" text-anchor="middle" fill="#ffd700">LiNbO₃ Film</text>

  <!-- Process Parameters Box -->
  <rect x="50" y="240" width="680" height="130" fill="rgba(0,0,0,0.3)" stroke="rgba(191, 230, 255, 0.3)" stroke-width="1" rx="8"/>
  
  <!-- Parameters Title -->
  <text x="70" y="265" font-size="13" font-weight="bold" fill="#bfe6ff">Process Parameters:</text>

  <!-- Column 1: Temperature -->
  <text x="70" y="295" font-size="11" font-weight="bold" fill="#87ceeb">Temperature</text>
  <text x="70" y="315" font-size="10" fill="#e6e6e6">• Precursor Zone: 250-300°C</text>
  <text x="70" y="330" font-size="10" fill="#e6e6e6">• Reactor Zone: 700-800°C</text>
  <text x="70" y="345" font-size="10" fill="#e6e6e6">• Controlled heating ramps</text>

  <!-- Column 2: Precursor -->
  <text x="300" y="295" font-size="11" font-weight="bold" fill="#87ceeb">Precursor Chemistry</text>
  <text x="300" y="315" font-size="10" fill="#e6e6e6">• Aminoalkoxide ligands</text>
  <text x="300" y="330" font-size="10" fill="#e6e6e6">• Tunable oligomerization</text>
  <text x="300" y="345" font-size="10" fill="#e6e6e6">• Z-axis orientation control</text>

  <!-- Column 3: Outcomes -->
  <text x="530" y="295" font-size="11" font-weight="bold" fill="#87ceeb">Film Properties</text>
  <text x="530" y="315" font-size="10" fill="#e6e6e6">• Crystalline LiNbO₃ films</text>
  <text x="530" y="330" font-size="10" fill="#e6e6e6">• Oriented growth</text>
  <text x="530" y="345" font-size="10" fill="#e6e6e6">• High optical quality</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#87ceeb"/>
    </marker>
  </defs>

  <!-- Bottom note -->
  <text x="400" y="450" font-size="11" text-anchor="middle" fill="#b0b0b0" font-style="italic">
    Patented molecular precursor technology enables precise control of thin-film crystallography
  </text>
  <text x="400" y="470" font-size="11" text-anchor="middle" fill="#b0b0b0" font-style="italic">
    for integrated photonics applications
  </text>
</svg>